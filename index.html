<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Spiel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1>Snake Spiel</h1>
        <div class="score-board">
            <span>Punkte: <span id="score">0</span></span>
            <span>Bestzeit: <span id="highScore">0</span></span>
        </div>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div class="controls">
            <p>Steuerung: Pfeiltasten zum Bewegen</p>
            <p>Drücke "Spiel starten" und dann eine Pfeiltaste um zu beginnen</p>
            <button id="startBtn">Spiel starten</button>
            <button id="pauseBtn">Pause</button>
        </div>
        <div id="gameOver" class="game-over hidden">
            <h2>Spiel vorbei!</h2>
            <p>Deine Punkte: <span id="finalScore">0</span></p>
            <button id="restartBtn">Neues Spiel</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
